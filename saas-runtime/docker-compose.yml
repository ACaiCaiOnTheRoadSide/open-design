# ============================================================================
# Open Design SaaS — 单机 docker-compose 部署
#
# 这是 open-design-saas.md(v3 低入侵方案)的【单机自部署版】:
# 把方案里"百智云 K8s/Helm + 平台 MinIO"换成"单机 Docker + 自部署 MinIO/PG",
# 所有服务容器化。适合用户量不大时先跑起来;将来扩容再迁回 K8s,架构不变。
#
# 与 v3 K8s 版的对应:
#   平台 MinIO            → 自部署 minio 服务(S3 兼容,代码零改,只换 endpoint)
#   平台 PostgreSQL       → 自部署 postgres 服务
#   K8s Pod 动态创建 daemon → backend 通过挂载的 Docker socket 动态起 daemon 容器
#   Helm Chart           → 本文件
#   百智云网关注入身份 header → 单机用 DEV_MODE 固定身份(见 backend 环境变量)
#
# ── 用法(profiles 分组)─────────────────────────────────────────────────
#   现在就能跑的基础设施(MinIO + PostgreSQL,开发 backend 时需要它们):
#       docker compose up -d                      # 默认只起 infra
#   构建 daemon 镜像(现成,saas-runtime/Dockerfile):
#       docker compose --profile build build daemon
#   应用层(backend/frontend/od-web —— 见 implementation-plan.md,尚未实现):
#       docker compose --profile app up -d        # 等代码就位后
#
# ── 服务总览 ───────────────────────────────────────────────────────────
#   minio        对象存储(.od/ 状态 + 制品)              [infra,现成可跑]
#   minio-init   一次性:建 bucket                        [infra,现成可跑]
#   postgres     控制面数据库(byok/call/session 表)       [infra,现成可跑]
#   migrate      一次性:建表迁移                          [app,待 backend]
#   backend      Go 控制面(鉴权/计费/容器调度/API 代理)   [app,待实现]
#   od-web       OD Web 前端(从 OD 源码构建,iframe 内容)  [app,待 Dockerfile]
#   frontend     SaaS 外壳 + 控制台 + nginx 分流入口      [app,待实现]
#   daemon       daemon 镜像(运行时由 backend 动态起,不常驻) [build-only,现成]
# ============================================================================

name: open-design-saas

# ── 共享环境片段(YAML 锚点,给 backend/migrate 复用)───────────────────────
x-backend-env: &backend-env
  # 数据库
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_USER: ${POSTGRES_USER:-odsaas}
  DB_PASSWORD: ${POSTGRES_PASSWORD:-odsaas-dev-pw}
  DB_NAME: ${POSTGRES_DB:-open_design_saas}
  # 对象存储(S3 兼容,自部署 MinIO)
  OSS_ENDPOINT: http://minio:9000
  OSS_ACCESS_KEY: ${MINIO_ROOT_USER:-odadmin}
  OSS_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-od-minio-dev-secret}
  OSS_BUCKET: ${OSS_BUCKET:-open-design}
  OSS_DIRECTORY: open-design          # 对应 v3 的 oss.directory 前缀
  # BYOK 凭证 AES-256 加密密钥(生产务必改,放 .env)
  BYOK_ENCRYPTION_KEY: ${BYOK_ENCRYPTION_KEY:-change-me-32-bytes-dev-key-000000}

services:

  # ────────────────────────────────────────────────────────────────────
  # 对象存储 —— 自部署 MinIO(替代百智云平台 MinIO)
  # .od/ 状态包 + 制品都存这。S3 兼容,将来换云 OSS 只改上面的 OSS_ENDPOINT
  # ────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-odadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-od-minio-dev-secret}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"      # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # Web 控制台(浏览器看桶里的文件)
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [od-saas-net]

  # 一次性:创建应用 bucket(桶),跑完即退
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set od http://minio:9000 $${MINIO_ROOT_USER:-odadmin} $${MINIO_ROOT_PASSWORD:-od-minio-dev-secret} &&
      mc mb -p od/$${OSS_BUCKET:-open-design} &&
      echo 'bucket ready' && exit 0
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-odadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-od-minio-dev-secret}
      OSS_BUCKET: ${OSS_BUCKET:-open-design}
    networks: [od-saas-net]

  # ────────────────────────────────────────────────────────────────────
  # 控制面数据库 —— 自部署 PostgreSQL
  # 存 byok_configs / call_records / active_sessions 三张表(见 v3 §4.5)
  # ────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-odsaas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odsaas-dev-pw}
      POSTGRES_DB: ${POSTGRES_DB:-open_design_saas}
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"       # 开发时本机可连;生产可去掉
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odsaas} -d ${POSTGRES_DB:-open_design_saas}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [od-saas-net]

  # ────────────────────────────────────────────────────────────────────
  # 数据库迁移(一次性 Job)—— 建表,跑完即退
  # 【待实现】依赖 backend 的 cmd/migrate(见 implementation-plan §2.1)
  # ────────────────────────────────────────────────────────────────────
  migrate:
    profiles: ["app"]
    build:
      context: ./backend           # 【待 SaaS 仓库初始化】Go 控制面目录
      dockerfile: Dockerfile
    command: ["/app/migrate"]      # 模板的 cmd/migrate 入口
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
    networks: [od-saas-net]

  # ────────────────────────────────────────────────────────────────────
  # Go 控制面 —— 整个 SaaS 的中枢
  # 职责:读身份 → BYOK 管理 → 计费 → 动态起/销毁 daemon 容器 → API 代理(含 SSE)
  # 【待实现】见 implementation-plan §2
  # 单机关键:挂 Docker socket,backend 用 Docker API 起 daemon 容器(替代 K8s Pod)
  # ────────────────────────────────────────────────────────────────────
  backend:
    profiles: ["app"]
    build:
      context: ./backend           # 【待 SaaS 仓库初始化】
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
      # 单机没有百智云网关注入身份 header → 用 DEV 模式固定身份(单租户/自用)
      DEV_MODE: "true"
      DEV_USER_ID: ${DEV_USER_ID:-local-user}
      DEV_TEAM_ID: ${DEV_TEAM_ID:-local-team}
      # daemon 容器调度(单机用 Docker socket,不是 K8s)
      CONTAINER_RUNTIME: docker
      DAEMON_IMAGE: open-design/daemon:latest    # 由下方 daemon 服务构建
      DAEMON_NETWORK: od-saas-net                # backend 起的 daemon 容器加入此网,才能被代理
      DAEMON_DATA_VOLUME_PREFIX: od-session-     # 每会话一个临时卷,restore .od/ 进去再挂给 daemon
      SESSION_IDLE_TIMEOUT: ${SESSION_IDLE_TIMEOUT:-30m}
      SESSION_BACKUP_INTERVAL: ${SESSION_BACKUP_INTERVAL:-5m}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # ★ 让 backend 能动态起 daemon 容器
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks: [od-saas-net]

  # ────────────────────────────────────────────────────────────────────
  # OD Web 前端 —— 原生 OD apps/web,所有用户共享一个实例(iframe 里的内容)
  # 【待实现 Dockerfile】从 OD 源码构建,零改动(见 implementation-plan §4)
  # ────────────────────────────────────────────────────────────────────
  od-web:
    profiles: ["app"]
    build:
      context: ./images/od-web     # 【待实现】拉 OD 源码 → 构建 apps/web
      dockerfile: Dockerfile
      args:
        OD_VERSION: ${OD_VERSION:-main}   # 跟踪 OD 上游的版本/分支/commit
    restart: unless-stopped
    networks: [od-saas-net]

  # ────────────────────────────────────────────────────────────────────
  # SaaS 外壳 + 控制台前端 + nginx 分流入口(单机对外的总入口)
  # nginx 把 /api/* → backend、/ → od-web、/console|/admin → 自己(见 v3 §3.4)
  # 【待实现】见 implementation-plan §5
  # ────────────────────────────────────────────────────────────────────
  frontend:
    profiles: ["app"]
    build:
      context: ./frontend          # 【待 SaaS 仓库初始化】
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"      # ★ 浏览器访问的入口
    depends_on:
      - backend
      - od-web
    networks: [od-saas-net]

  # ────────────────────────────────────────────────────────────────────
  # daemon 镜像 —— 不常驻!仅用于构建镜像;运行时由 backend 通过 Docker socket
  # 按需起一个个 per-session / per-turn 容器,用完即毁。
  # build context 当前用现成的 saas-runtime/(本目录);SaaS 仓库化后挪到 images/daemon/
  # ────────────────────────────────────────────────────────────────────
  daemon:
    profiles: ["build"]            # 只在 `--profile build build daemon` 时构建
    build:
      context: .                   # 现成:saas-runtime/Dockerfile
      dockerfile: Dockerfile
    image: open-design/daemon:latest
    command: ["true"]              # 占位,不真正运行
    networks: [od-saas-net]

volumes:
  minio-data:                      # MinIO 对象数据
  pg-data:                         # PostgreSQL 数据

networks:
  od-saas-net:
    name: od-saas-net              # 固定名:backend 动态起 daemon 容器时要指定它
    driver: bridge
